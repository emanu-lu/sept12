    <title>E & L | 12.09.26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>

    <nav class="language-picker">
        <button onclick="setLanguage('es')">ES</button>
        <button onclick="setLanguage('it')">IT</button>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 id="hero-title">Emanuele <br> & Lucía</h1>
            <p class="date">12 . 09 . 2026</p>
        </div>
        <div class="photo-wrapper">
            <img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867158/fotomaton_aakpn4.png" alt="E & L" class="fotomaton" id="hero-photo">
            </div>

            <h2 id="rsvp-greeting" style="display:none;" class="puestos"></h2>
            <button id="btn-open-rsvp" style="display:none;" class="btn-secundario"></button>
            
    </header>
    
    <section id="access-section">
        <div class="search-box">
            <input type="text" id="guestInput" placeholder="">
            <button onclick="validateGuest()" id="btn-search"></button>
        </div>
        <p id="error-msg" style="display:none; color: red;"></p>
    </section>

    <div id="rsvp-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <section class="rsvp">
                <div id="mensaje-exito" style="display: none; text-align: center; padding: 40px 20px;">
    <h2 id="success-title" style="color: var(--naranja); font-size: 3rem;"></h2>
    <p id="texto-exito" style="font-size: 1.2rem; font-weight: 600;"></p>
</div>
                <form id="rsvp-form">
                    <p id="guest-1-label" style="font-family: 'Playfair Display'; color: var(--naranja); margin-bottom: 15px; font-style: italic;"></p>
                    
                    <div class="form-group">
                        <label id="label-attendance"></label>
                        <select name="attendance" id="main-attendance" required>
                            <option value="si" id="opt-yes"></option>
                            <option value="no" id="opt-no"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label id="label-bus"></label>
                        <select name="bus" required>
                            <option value="no" class="opt-no-text"></option>
                            <option value="si" class="opt-yes-text"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label id="label-hotel"></label>
                        <select name="hotel" required>
                            <option value="no" class="opt-no-text"></option>
                            <option value="si" class="opt-yes-text"></option>
                        </select>
                    </div>

                <div class="form-group">
                    <label id="label-allergies"></label>
                    <select name="dieta_especial" id="alergias-select" onchange="mostrarCajetinAlergias()">
                        <option value="ninguna" id="opt-ninguna"></option>
                        <option value="vegetariano" id="opt-veg"></option>
                        <option value="vegano" id="opt-vegan"></option>
                        <option value="celiaco" id="opt-cel"></option>
                        <option value="lactosa" id="opt-lac"></option>
                        <option value="otra" id="opt-otra"></option>
                    </select>

                    <div id="cajetin-otra-alergia" style="display: none; margin-top: 15px;">
                        <label id="lbl-especificar" style="font-size: 0.9rem;"></label>
                        <input type="text" name="alergias_detalle">
                    </div>
                    <div class="form-group" style="margin-top: 30px; border-top: 1px solid var(--borde); padding-top: 20px;">
                        <label id="label-song"></label>
                        <input type="text" name="song">
                    </div>
                </div>

                    <div id="guests-container"></div>



                    <button type="submit" id="btn-submit"></button>
                </form>
            </section>
        </div>
    </div>

<main id="main-content" style="display:none;">
        <p id="deadline-text" style="font-style: italic; margin-top: 15px; color: var(--naranja)"></p>
        
        <div class="decoracion-img"><img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867526/6_wwxtgg.png" alt="Pajaritos"></div>

            <section class="section-container location-card">

            <div class="polaroid-item"><img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867172/1_yhb1qm.png"></div>

        </section>

        <div class="decoracion-img"><img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867526/9_x9lhrv.png" alt="Sol"></div>
<div class="event-grid-row">
    <section class="section-container location-card">
        <h2 id="ceremonia-titulo"></h2>
        <img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776870793/1920px-PPA9841_palazzo_comunale_04-1024x682_ela9hs.jpg" alt="Ayuntamiento" class="venue-photo">
        <p id="ceremonia-text" class="text-justified"></p>
        <a href="https://maps.app.goo.gl/WouYodBpy7SZg55p8" target="_blank" id="btn-map" class="btn-secundario">Ver mapa</a>
    </section>

    <section class="section-container location-card">
        <h2 id="casa-titulo"></h2>
        <img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1772993263/20250619-121052_2_123122-175197018018054_ypkmb1.jpg" alt="Casa Catani" class="venue-photo">
        <p id="location-text" class="text-justified"></p>
        <a href="https://maps.app.goo.gl/oyD2gmmkkQFRa4sc7" target="_blank" id="btn-map2" class="btn-secundario">Ver mapa</a>
    </section>
</div>
<div class="decoracion-img"><img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867525/7_rsffwq.png" alt="Estrellas"></div>
<section class="section-container timeline-horizontal-section">
    <h2 id="location-title" style="text-align: center; margin-bottom: 40px;"></h2>
    <div class="timeline horizontal">
        <div class="timeline__list">
            <article class="timeline__item">
                <div class="timeline__time" id="ceremony-time"></div>
                <h3 class="timeline__title" id="ceremony-title"></h3>
                <p class="timeline__desc" id="ceremony-desc"></p>
            </article>
            <article class="timeline__item">
                <div class="timeline__time" id="bus-time"></div>
                <h3 class="timeline__title" id="bus-title"></h3>
                <p class="timeline__desc" id="bus-desc"></p>
            </article>
            <article class="timeline__item">
                <div class="timeline__time" id="party-time"></div>
                <h3 class="timeline__title" id="party-title"></h3>
                <p id="party-desc" class="timeline__desc"></p>
            </article>
        </div>
    </div>
</section>

        <section class="logistics container">
            <h2 id="travel-title" class="titulos-card"></h2>
            <div class="logistics-grid">
                <div class="info-card">
                    <img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867525/2_dtj6wb.png" alt="Hotel" class="ilustracion-icono">
                    <div class="info-card__content">
                        <h3 class="card__title" id="hotel-title-card"></h3>
                        <p class="card__text" id="hotel-text-card"></p>
                    </div>
                </div>
                <div class="info-card">
                    <img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867525/5_fd7phw.png" alt="Vuelos" class="ilustracion-icono">
                    <div class="info-card__content">
                        <h3 class="card__title" id="vuelos-title"></h3>
                        <p class="card__text" id="vuelos-text"></p>
                    </div>
                </div>
                <div class="info-card">
                    <img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867858/Dise%C3%B1o_sin_t%C3%ADtulo_78_eev8dh.png" alt="Transporte" class="ilustracion-icono">
                    <div class="info-card__content">
                        <h3 class="card__title" id="transporte-title"></h3>
                        <p class="card__text" id="travel-text"></p>
                    </div>
                </div>
            </div>
        </section>

        <div class="decoracion-img"><img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867526/8_w4pzuu.png" alt="Flores"></div>

        <section class="gift container">
            <h2 id="gift-title" class="titulos-card"></h2>
            <div class="info-card">
                <img src="https://res.cloudinary.com/dhryyhnig/image/upload/v1776867526/1_o3weql.png" alt="Regalo" class="ilustracion-icono">
                <div class="info-card__content">
                    <p id="gift-text" class="card__text"></p>
                    <div class="iban-box">
                        <small>IBAN:</small>
                        <p>ES87 1583 0001 1191 8723 1246</p>
                    </div>
                    <p id="thanks-text" class="card__text"></p>
                </div>
            </div>
        </section>
    </main>

    <footer><p>E & L | 2026</p></footer>
    <script src="app.js"></script>
</body>
</html>
